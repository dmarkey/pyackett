  allowtvsearchimdb: true

settings:
  - name: cookie
    type: text
    label: Cookie
  - name: useragent
    type: text
    label: User-Agent (must match your browser)
  - name: info_setup
    type: info
    label: Setup Instructions
    default: "In IPTorrents website Settings:<ul><li>Set <b>Torrents per page</b> to <b>100</b></li><li>Tick <b>Show files count</b></li><li>Set <b>Category column</b> to <b>Icons</b></li></ul>"
  - name: sort
    type: select
    label: Sort requested from site
    default: time
    options:
      time: created
      size: size
      seeders: seeders
      name: title
  - name: freeleech
    type: checkbox
    label: Search freeleech only
    default: false

login:
  method: cookie
  inputs:
    cookie: "{{ .Config.cookie }}"
  test:
    path: t
    selector: a[href="/lout.php"]

search:
  paths:
    - path: t

  inputs:
    $raw: "{{ range .Categories }}{{ . }}=&{{ end }}"
    q: "{{ if .Query.IMDBID }}+({{ .Query.IMDBID }}){{ else }}{{ if .Keywords }}+({{ .Keywords }}){{ end }}{{ end }}"
    qf: "{{ if .Query.IMDBID }}all{{ else }}{{ end }}"
    o: "{{ .Config.sort }}"
    free: "{{ if .Config.freeleech }}on{{ else }}{{ end }}"

  keywordsfilters:
    - name: re_replace
      args: ["\\s+", " "]

  rows:
    selector: "table#torrents > tbody > tr:has(a.hv)"

  fields:
    title:
      selector: a.hv
      filters:
        - name: re_replace
          args: ["[\\x00-\\x08\\x0A-\\x1F]", ""]
        - name: re_replace
          args: ["(?i)[\\(\\[\\{]REQ(UEST(ED)?)?[\\)\\]\\}]", ""]
        - name: trim
          args: " -:"
    details:
      selector: a.hv
      attribute: href
    download:
      selector: "a[href^=\"/download.php/\"]"
      attribute: href
    _descr:
      selector: div.sub
    _datePart:
      selector: div.sub
      filters:
        - name: split
          args: ["|", -1]
        - name: re_replace
          args: ["\\s*by\\s+.*$", ""]
        - name: trim
    date:
      text: "{{ .Result._datePart }}"
      filters:
        - name: fuzzytime
    category:
      selector: "td:nth-of-type(1) a[href^=\"?\"]"
      attribute: href
      filters:
        - name: replace
          args: ["?", ""]
        - name: split
          args: ["&", 0]
    size:
      selector: "td:nth-of-type(6)"
    seeders:
      selector: "td:nth-of-type(8)"
    leechers:
      selector: "td:nth-of-type(9)"
    grabs:
      selector: "td:nth-of-type(7)"
    downloadvolumefactor:
      selector: "span.free"
      optional: true
      case:
        "": 1
      default: 0
    uploadvolumefactor:
      text: 1
    minimumratio:
      text: 1
    minimumseedtime:
      # 14 days
      text: 1209600
